name: CI/CD Pipeline - Docker Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # PR이 아닌 main 브랜치 푸시일 때만 로그인 및 푸시 진행
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # 만약 dog_breed_api 자체가 레포지토리 루트가 아니라면 context를 ./dog_breed_api 로 변경해야 합니다.
          context: .
          # Mac(Apple Silicon)에서 Pull 받을 수 있도록 arm64 아키텍처를 같이 빌드합니다.
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/dog-breed-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dog-breed-api:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/dog-breed-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/dog-breed-api:buildcache,mode=max

  deploy:
    name: Deploy to Local Server
    needs: docker
    if: github.event_name != 'pull_request'
    # Self-hosted 플래그를 통해 사용자의 컴퓨터로 작업이 할당됩니다.
    runs-on: self-hosted
    
    steps:
      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
        
      - name: Pull Docker image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/dog-breed-api:latest
        
      - name: Stop and remove existing container
        # 오류가 나도 워크플로우가 멈추지 않도록 || true 를 붙여줍니다 (처음 실행 시 컨테이너가 없기 때문)
        run: docker rm -f dog-breed-api || true
          
      - name: Run new container
        run: docker run -d --name dog-breed-api -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKERHUB_USERNAME }}/dog-breed-api:latest
          
      - name: Clean up unused Docker images
        # 공간 부족을 방지하기 위해 사용하지 않는 (이전 버전의) 이미지(dangling)들을 지웁니다.
        run: docker image prune -f
